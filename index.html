<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="header">
        <div class="title"><strong>LIBRARY</strong></div>
        <div class="btn">Log in</div>
    </div>
    <div class="main">
        <div class="sup">
            <div class="btn formBtn">+ Add Book</div>
        </div>
        <div class="inf">
            <dialog closedby="any">
                <div class="formContainer">
                    <div class="formTitle">Add new book</div>
                    <form method="dialog">
                        <div class="title">
                            <label for="title"></label>
                            <input type="text" id="title" name="title" placeholder="Title" required>
                        </div>
                        <div class="author">
                            <label for="author"></label>
                            <input type="text" id="author" name="author" placeholder="Author" required>
                        </div>
                        <div class="pages">
                            <label for="pages"></label>
                            <input type="number" id="pages" name="pages" placeholder="Pages" required>
                        </div>
                        <div class="read">
                            <div>Have you read it ?</div>
                            <input type="checkbox" name="read">
                        </div>
                        <button type="button" id="subBtn">Submit</button>
                    </form>
                </div>
            </dialog>
            <div class="grille"></div>
        </div>
    </div>
    <div class="footer">
        <div class="content">
            <div>Copyright © 2026 orel</div>
